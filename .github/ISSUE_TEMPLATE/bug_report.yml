name: Bug report
description: Report a reproducible problem with Codex PR Pilot.
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the problem and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include the command, workflow snippet, or minimal diff that reproduces the issue.
      placeholder: |
        1. Run ...
        2. See ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "0.1.0"
    validations:
      required: false
