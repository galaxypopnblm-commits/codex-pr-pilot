name: Feature request
description: Suggest a focused improvement for Codex PR Pilot.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What maintainer workflow would this improve?
      placeholder: "Example: It is hard to review large PRs because..."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful version of the feature.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional notes on other approaches.
    validations:
      required: false
